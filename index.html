<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoirage</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./shared.css">
    <meta name="description" content="Offline-first personal knowledge capture app">
    <meta name="theme-color" content="#007bff">

    <link rel="manifest" href="./manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Memoirage">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 640px;
            margin: 20px auto;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 1.2em;
            margin-bottom: 36px;
            opacity: 0.9;
        }
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .menu-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 30px 20px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: block;
        }
        .menu-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .menu-item h3 {
            margin: 0 0 10px 0;
            font-size: 1.35em;
        }
        .menu-item p {
            margin: 0;
            opacity: 0.86;
            font-size: 0.92em;
            line-height: 1.4;
        }
        .status {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
        }
        .status h4 { margin: 0 0 10px 0; }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .stat { text-align: center; }
        .stat .number {
            font-size: 2em;
            font-weight: bold;
        }
        .stat .label {
            font-size: 0.8em;
            opacity: 0.8;
        }
        .install-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }
        .install-btn:hover { background: #218838; }
    </style>

    <script src="./db.js"></script>
    <script src="./shared.js" defer></script>
</head>
<body data-page="home">
    <div id="shared-nav"></div>
    <div class="container">
        <h1>Memoirage</h1>
        <p class="subtitle">Capture fleeting thoughts and connect them later.</p>

        <div class="menu">
            <a href="./capture.html" class="menu-item">
                <h3>Capture</h3>
                <p>Save ideas quickly as inbox notes.</p>
            </a>
            <a href="./processing.html" class="menu-item">
                <h3>Processing</h3>
                <p>Review inbox notes and move them forward.</p>
            </a>
            <a href="./graph.html" class="menu-item">
                <h3>Storage</h3>
                <p>Browse done notes and manage links.</p>
            </a>
        </div>

        <div class="status">
            <h4>Workspace Status</h4>
            <div id="stats" class="stats">
                <div class="stat">
                    <div class="number" id="inboxCount">-</div>
                    <div class="label">Inbox</div>
                </div>
                <div class="stat">
                    <div class="number" id="doneCount">-</div>
                    <div class="label">Done</div>
                </div>
                <div class="stat">
                    <div class="number" id="totalCount">-</div>
                    <div class="label">Total</div>
                </div>
            </div>
        </div>

        <button id="installBtn" class="install-btn">Install App</button>
    </div>

    <script>
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (event) => {
            event.preventDefault();
            deferredPrompt = event;
            document.getElementById('installBtn').style.display = 'block';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
        });

        async function loadStats() {
            try {
                const [inbox, done, total] = await Promise.all([
                    getNotes({ status: 'inbox', include_deleted: false }),
                    getNotes({ status: 'done', include_deleted: false }),
                    getNotes({ include_deleted: false })
                ]);

                document.getElementById('inboxCount').textContent = inbox.length;
                document.getElementById('doneCount').textContent = done.length;
                document.getElementById('totalCount').textContent = total.length;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        async function initHome() {
            try {
                await initDB();
                await loadStats();
                setInterval(loadStats, 5000);
            } catch (error) {
                console.error('Failed to initialize home:', error);
            }
        }

        initHome();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('SW registered:', registration);
                    })
                    .catch((registrationError) => {
                        console.log('SW registration failed:', registrationError);
                    });
            });
        }
    </script>
</body>
</html>
