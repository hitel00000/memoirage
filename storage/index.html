<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memoirage - Redirecting</title>
  <script>
    (function () {
      var path = window.location.pathname;
      var base = path.replace(/\/storage\/?$/, '/');
      var redirectTarget = base + 'index.html?route=' + encodeURIComponent(base + 'storage/');
      window.location.replace(redirectTarget);
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
